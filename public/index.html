  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="icon" href="%PUBLIC_URL%/Logooo.jpg" />

  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will

  <title>BlackS City</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
       <div id="fb-root"></div>

  <!-- Script khởi tạo Facebook SDK với kiểm tra lỗi -->
   <!-- Script khởi tạo Facebook SDK với kiểm tra lỗi chi tiết -->
  <script>
    window.fbAsyncInit = function () {
      try {
        FB.init({
          appId: '1990403858454221', // App ID của bạn
          cookie: true,
          xfbml: true,
          version: 'v21.0', // Thử phiên bản mới nhất
          status: true
        });

        // Tránh gọi getLoginStatus trên HTTP, chỉ log khởi tạo
        console.log('Facebook SDK đã được khởi tạo');
      } catch (error) {
        console.error('Lỗi khi khởi tạo Facebook SDK:', error);
      }
    };

    // Tải script Facebook SDK với fallback
    (function(d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s); js.id = id;
      js.src = "https://connect.facebook.net/vi_VN/sdk.js";
      js.async = true;
      js.defer = true;
      js.crossOrigin = "anonymous";
      js.onload = function() {
        console.log('Facebook SDK đã tải thành công');
      };
      js.onerror = function() {
        console.error('Lỗi khi tải Facebook SDK. Thử lại sau 2 giây...');
        setTimeout(() => {
          js.src = js.src; // Thử tải lại
        }, 2000);
      };
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));
  </script>
</body>

</html>
